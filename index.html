<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Tracker</title>

<!-- DaisyUI -->
 <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

<style>
    *{
        font-family:"Geist", sans-serif;
    }
</style>

</head>
<body class="bg-[#F8FAFC] py-8">
<section class="bg-white w-4/12 mx-auto shadow-2xl rounded-xl py-5">
<img src="./assets/github-logo.png" alt="" class="mx-auto">
<div class="pt-4 text-center">
    <h2 class="font-semibold text-[24px]">GitHub Issues Tracker</h2>
<p class="text-[16px] text-[#64748B]">Sign in to manage your issues</p>
</div>

<div class="mx-5">
    <fieldset class="fieldset">
  <legend class="fieldset-legend text-[16px] font-medium">Username</legend>
  <input id="input-username" type="text" class="input w-full" placeholder="Enter Username" />
  <p class="text-[14px] text-[#4A00FF]">Default: admin</p>
</fieldset>

  <legend class="fieldset-legend text-[16px] font-medium">Password</legend>
<input id="input-password" type="password" class="input validator w-full" required placeholder="Enter Password" minlength="7">
  <p class="text-[14px] text-[#4A00FF] mt-1">Default: admin123</p>


  <button id="signIn-btn" class="btn btn-primary w-full mt-6">Sign In</button>

</div>

<div class="flex items-center gap-3 mx-5 mt-8">
  <hr class="flex-1 border-gray-300">
  <span class="text-[16px]">OR</span>
  <hr class="flex-1 border-gray-300">
</div>
<p class="text-center text-[14px] text-gray-500">Demo Credentials:</p>
<div class="mx-5 bg-[#F8FAFC] text-[16px] text-center p-6 rounded-xl">
    <span class="font-semibold">Username:</span><span class="text-gray-500">admin</span> <br>
    <span class="font-semibold">Password:</span><span class="text-gray-500">admin123</span>
</div>

</section>

<section></section>
    
<script src="./script.js"></script>
</body>
</html>
