<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>

    <!-- DaisyUI -->
 <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

<!-- font awsome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<link rel="stylesheet" href="style.css">
<style>
    *{
        font-family:"Geist", sans-serif;

    }

</style>

</head>
<body class="bg-[#F8FAFC]">
   <header class="bg-white flex flex-col md:flex-row md:justify-between px-8 border border-gray-300 py-3 gap-3">
        <div class="flex gap-2">
            <img src="./assets/github-logo.png" alt="" class="h-[36px] w-[36px]">
            <h2 class="font-semibold text-[24px] sm:text-[20px]">GitHub Issues Tracker</h2>
        </div>
   
   
        <!--search box  -->
        
   <div class="flex gap-4">

<div>
       <label class="input">
  <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
    <g
      stroke-linejoin="round"
      stroke-linecap="round"
      stroke-width="2.5"
      fill="none"
      stroke="currentColor"
    >
      <circle cx="11" cy="11" r="8"></circle>
      <path d="m21 21-4.3-4.3"></path>
    </g>
  </svg>
  <input type="search" required placeholder="Search issues..." />
</label>
  </div>


  <button class="btn bg-[#4A00FF] text-white"><i class="fa-solid fa-plus"></i>New Issue</button>
</div>
   
    </header>
    <section class="w-10/12 mx-auto mt-10">
        <div class="bg-white p-4 mb-5 rounded-lg">
            <button id="all-btn" onclick="loadCards()" class="btn load-btn text-[16px] mr-3 font-semibold bg-white text-[#64748B] w-24">All</button>
            <button id="open-btn" onclick="loadOpenCards()" class="btn load-btn text-[16px] mr-3 bg-white font-semibold text-[#64748B] w-24">Open</button>
            <button id="close-btn" onclick="loadCloseCards()" class="btn load-btn text-[16px] font-semibold bg-white text-[#64748B] w-24">Close</button>
        </div>
        
        <section class="rounded-lg">
            <div class="grid grid-cols-2 px-4 py-3 bg-white rounded-lg border border-gray-200 shadow-md">
                <div class="flex">
                    <div class="bg-[#ECE4FF] rounded-full w-10 h-10 my-auto "><img src="assets/Aperture.png" alt="" class="my-1.5 mx-auto"></div>
                    <div class="pl-2"><p class="font-semibold text-[20px]">
                        <span id="project-amount">50</span> Issues</p>
                    <p class="text-[16px] text-[#64748B]">Track and manage your project issues</p></div>
                </div>
                <div class="flex p-4 justify-end gap-2">
                    <div class="w-[10px] h-[10px] bg-[#00A96E] rounded-full mt-2"></div> <span>Open</span>
                    <div class="w-[10px] h-[10px] bg-[#A855F7] rounded-full mt-2"></div> <span>Close</span>
                </div>
            </div>
    <!-------------------- cards------------ -->
            
    <section id="card-container" class="bg-[#FBFBFB] grid grid-cols-1 gap-4 mt-8 p-10 md:grid-cols-2 lg:grid-cols-4 shadow-lg"></section>
    
    <!-- Open the modal using ID.showModal() method -->
<!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->

<dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
  <div class="modal-box rounded-xl">
    <div id="modal-card">
       
    </div>
    <div class="modal-action">
      <form method="dialog">
        <!-- if there is a button in form, it will close the modal -->
        <button class="btn bg-[#4A00FF] border-none text-white outline-none">Close</button>
      </form>
    </div>
  </div>
</dialog>
    </section>
    <script src="./cards.js"></script>
</body>
</html>
